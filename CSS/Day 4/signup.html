<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="signup.css">
</head>
<body>
    <div class="box">
        <form >
            <h1>Sign Up</h1>
            <p>Please fill this form to create an account</p>
            <hr>

            <input type="text"  placeholder="First Name" name="Fname" style="display: inline">
            <input type="text" placeholder="Second Name" name="Sname" style="display: inline" >
            <input type="email" placeholder="Email Address" name="mailId" >
            <input type="password" placeholder="password" name="pass" >
            <input type="password" placeholder="Confirm password" name="Cpass" >
            <div style="margin-top: 20px;">
                <input type="checkbox" id="agree">
                 <label for="agree">I accept the Term of Use & Privacy Policy.</label>
            </div>

              <button>Sign Up</button>
        </form>

    </div>
</body>
</html>
