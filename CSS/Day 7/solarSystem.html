<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Solar System 3D View</title>
  <!-- Link to external CSS -->
  <link rel="stylesheet" href="solarSystem.css">
</head>
<body>
  <div class="solar-system">
    <div class="sun"></div>
    <div class="orbit mercury"><div class="planet"></div></div>
    <div class="orbit venus"><div class="planet"></div></div>
    <div class="orbit earth">
      <div class="planet">
        <div class="moon"></div>
      </div>
    </div>
    <div class="orbit mars"><div class="planet"></div></div>

    <!-- Asteroid Belt -->
    <div class="asteroid-belt">
      <div class="asteroid" style="top:10%; left:50%;"></div>
      <div class="asteroid" style="top:30%; left:70%;"></div>
      <div class="asteroid" style="top:60%; left:40%;"></div>
      <div class="asteroid" style="top:80%; left:60%;"></div>
    </div>

    <!-- Comet -->
    <div class="comet"></div>
  </div>
</body>
</html>
